name: Auto Release

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: auto-release
  cancel-in-progress: false

jobs:
  release:
    name: Create release if needed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release type
        id: release
        run: |
          LAST_TAG=$(git tag --sort=-v:refname --merged HEAD | head -1)

          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --format="%s")
            BASE_VERSION=$(node -p "require('./package.json').version")
          else
            COMMITS=$(git log --format="%s" "${LAST_TAG}..HEAD")
            BASE_VERSION="${LAST_TAG#v}"
          fi

          if [ -z "$COMMITS" ]; then
            echo "type=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TYPE="none"
          while IFS= read -r msg; do
            # Strip [LINEAR-XXX] / [SIM-123] style prefixes
            clean=$(echo "$msg" | sed 's/^\[[A-Za-z]*-[0-9]*\] //')
            if [[ "$clean" =~ ^[a-z]+(\([^)]*\))?!: ]]; then
              TYPE="major"; break
            elif [[ "$clean" =~ ^feat(\([^)]*\))?: ]] && [[ "$TYPE" != "major" ]]; then
              TYPE="minor"
            elif [[ "$clean" =~ ^(fix|perf)(\([^)]*\))?: ]] && [[ "$TYPE" == "none" ]]; then
              TYPE="patch"
            fi
          done <<< "$COMMITS"

          echo "type=$TYPE" >> "$GITHUB_OUTPUT"
          echo "base_version=$BASE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Compute new version
        if: steps.release.outputs.type != 'none'
        id: version
        run: |
          IFS='.' read -r M N P <<< "${{ steps.release.outputs.base_version }}"
          case "${{ steps.release.outputs.type }}" in
            major) V="$((M+1)).0.0" ;;
            minor) V="$M.$((N+1)).0" ;;
            patch) V="$M.$N.$((P+1))" ;;
          esac
          echo "value=$V" >> "$GITHUB_OUTPUT"
          echo "tag=v$V" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.release.outputs.type != 'none'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --target "${GITHUB_SHA}" \
            --generate-notes
