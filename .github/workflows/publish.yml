name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run check
      - run: npm run build

      # Verify the tarball contains dist/index.js and the bin mapping works
      - name: Pack and smoke test
        run: |
          npm pack
          TARBALL=$(ls coval-wizard-*.tgz)
          tar -tzf "$TARBALL" | grep -q "package/dist/index.js"
          mkdir -p /tmp/wizard-smoke
          npm install --prefix /tmp/wizard-smoke "$PWD/$TARBALL"
          /tmp/wizard-smoke/node_modules/.bin/coval-wizard 2>&1 || true
          rm -f "$TARBALL"

      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
