name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run check
      - run: npm run build

      # Verify the tarball contains dist/index.js and the module loads cleanly
      - name: Pack and smoke test
        run: |
          npm pack
          tar -tzf coval-wizard-*.tgz | grep -q "package/dist/index.js"
          node --input-type=module --eval "import('./dist/index.js').catch(e => { process.stderr.write(e.message); process.exit(1); })"
          rm -f coval-wizard-*.tgz

      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
