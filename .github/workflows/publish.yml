name: Publish

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  check-version:
    name: Check for version bump
    runs-on: ubuntu-latest
    outputs:
      is-new-version: ${{ steps.check.outputs.is-new-version }}
      version: ${{ steps.check.outputs.committed-version }}
    steps:
      - uses: actions/checkout@v4

      - name: Compare package.json version to npm
        id: check
        run: |
          COMMITTED=$(node -p "require('./package.json').version")
          if npm view @coval/wizard version > /tmp/npm_version.txt 2>/tmp/npm_err.txt; then
            PUBLISHED=$(cat /tmp/npm_version.txt | tr -d '[:space:]')
          elif grep -qiE "E404|not found" /tmp/npm_err.txt; then
            PUBLISHED="0.0.0"
          else
            echo "npm registry error:"
            cat /tmp/npm_err.txt
            exit 1
          fi
          echo "committed-version=$COMMITTED" >> $GITHUB_OUTPUT
          if [ "$COMMITTED" != "$PUBLISHED" ]; then
            echo "is-new-version=true" >> $GITHUB_OUTPUT
          else
            echo "is-new-version=false" >> $GITHUB_OUTPUT
          fi

  publish:
    name: Publish to npm
    needs: check-version
    if: needs.check-version.outputs.is-new-version == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run check
      - run: npm run build
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
